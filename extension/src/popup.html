<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 400px;
        padding: 10px;
        font-family: Arial, sans-serif;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
      }
      .header h1 {
        margin: 0;
        font-size: 16px;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background-color: #0056b3;
      }
      .status {
        margin-top: 15px;
        padding: 10px;
        background-color: #f0f0f0;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🤖 Copilot</h1>
    </div>
    <button id="askButton">Ask Copilot</button>
    <button id="settingsButton">Settings</button>
    <div class="status" id="status">Extension loaded. Ready to assist!</div>
    <script src="popup.js"></script>
  </body>
</html>
